<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kitchen Dash: Countable vs Uncountable</title>
    <!-- เรียกใช้ A-Frame และ AR.js รุ่นที่เสถียรที่สุดสำหรับ WebAR -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; }
        
        /* หน้าจอแนะนำการเล่นก่อนเริ่มเกม */
        #tutorial-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); color: white; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; text-align: center; padding: 20px; box-sizing: border-box;
        }
        #start-btn {
            background: #28a745; color: white; border: none; padding: 15px 35px;
            font-size: 20px; border-radius: 10px; cursor: pointer; margin-top: 20px;
            font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* ส่วนแสดงคะแนนและคำศัพท์ตรงกลาง */
        #game-ui {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; text-align: center; z-index: 1000;
            pointer-events: none; display: none;
        }
        .score-box { background: rgba(0,0,0,0.7); color: gold; padding: 8px 15px; border-radius: 20px; font-size: 18px; display: inline-block; margin-bottom: 10px; }
        .word-box { background: white; color: #333; padding: 15px; border-radius: 15px; font-size: 28px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* ปุ่มเลือกคำตอบฝั่งซ้าย-ขวา */
        #controls {
            position: fixed; bottom: 40px; left: 0; width: 100%;
            display: flex; justify-content: space-around; z-index: 1000;
            display: none; padding: 0 10px; box-sizing: border-box;
        }
        .btn {
            width: 45%; padding: 20px 10px; font-size: 20px; font-weight: bold;
            border: none; border-radius: 15px; color: white; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .btn-countable { background: #007bff; } /* ฝั่งซ้าย นับได้ */
        .btn-uncountable { background: #dc3545; } /* ฝั่งขวา นับไม่ได้ */

        /* แสดงผลตรวจคำตอบ Popup */
        #feedback {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; border-radius: 15px; font-size: 26px; font-weight: bold;
            color: white; display: none; z-index: 2000; text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <!-- 1. หน้าแรก: แนะนำการเล่น -->
    <div id="tutorial-overlay">
        <h2> Kitchen Dash: The Noun Sorter</h2>
        <p style="font-size: 18px; margin: 15px 0; max-width: 300px; line-height: 1.5;">
            ให้นักเรียนดูคำศัพท์ที่ปรากฏกลางหน้าจอ จากนั้นกดปุ่มเลือกฝั่งให้ถูกต้อง หรือเดินไปยืนฝั่งที่ครูกำหนด!
        </p>
        <button id="start-btn" onclick="startGame()">เริ่มเล่นเกมเลย!</button>
    </div>

    <!-- 2. หน้าจอสถานะเกม (UI Overlay) -->
    <div id="game-ui">
        <div class="score-box">คะแนนของคุณ: <span id="score">0</span></div>
        <div class="word-box" id="current-word">Loading...</div>
    </div>

    <!-- 3. ปุ่มกดเลือกฝั่ง -->
    <div id="controls">
        <button class="btn btn-countable" onclick="checkAnswer(true)">← Countable<br>(นับได้)</button>
        <button class="btn btn-uncountable" onclick="checkAnswer(false)">Uncountable →<br>(นับไม่ได้)</button>
    </div>

    <!-- 4. กล่องแจ้งเตือนผลลัพธ์ -->
    <div id="feedback"></div>

    <!-- 5. กล้องและสิ่งแวดล้อน AR (ระบบ Markerless / ตรวจจับพื้นผิวเบื้องต้น) -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <!-- สร้างจุดอ้างอิงแสงและมุมกล้องของ AR -->
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // รายการคำศัพท์ ป.6 ที่พร้อมนำไปสอน
        const wordList = [
            { word: "🍎 Apple", isCountable: true, hint: "Apple นับเป็นลูกๆ ได้จ้า" },
            { word: "🥛 Milk", isCountable: false, hint: "Milk เป็นของเหลว นับไม่ได้นะ" },
            { word: "🥚 Egg", isCountable: true, hint: "Egg นับเป็นฟองได้จ้า" },
            { word: "🍚 Rice", isCountable: false, hint: "Rice เมล็ดเล็กเกินไป กิโลนึงมีเป็นหมื่นเมล็ด นับไม่ได้นะ" },
            { word: "🍌 Banana", isCountable: true, hint: "Banana นับเป็นลูกหรือเป็นหวีได้จ้า" },
            { word: "🍞 Bread", isCountable: false, hint: "Bread นับเป็นก้อน/แผ่น แต่คำว่า Bread เป็นนามนับไม่ได้จ้า" }
        ];

        let currentIndex = 0;
        let score = 0;

        function startGame() {
            document.getElementById('tutorial-overlay').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('controls').style.display = 'flex';
            shuffleWords();
            showWord();
        }

        function shuffleWords() {
            wordList.sort(() => Math.random() - 0.5);
        }

        function showWord() {
            if(currentIndex >= wordList.length) {
                // เล่นครบทุกคำแล้ว
                document.getElementById('current-word').innerHTML = " 🎉 เก่งมากเล่นครบแล้ว! 🎉";
                document.getElementById('controls').style.display = 'none';
                return;
            }
            document.getElementById('current-word').innerText = wordList[currentIndex].word;
        }

        function checkAnswer(userAnswer) {
            const currentItem = wordList[currentIndex];
            const feedbackEl = document.getElementById('feedback');

            if (userAnswer === currentItem.isCountable) {
                // ตอบถูก
                score += 10;
                document.getElementById('score').innerText = score;
                feedbackEl.style.backgroundColor = "#28a745";
                feedbackEl.innerText = "ถูกต้อง! 🎉";
            } else {
                // ตอบผิด
                feedbackEl.style.backgroundColor = "#dc3545";
                feedbackEl.innerHTML = "ยังไม่ถูกน้า 💡<br><span style='font-size:16px; font-weight:normal;'>" + currentItem.hint + "</span>";
            }

            feedbackEl.style.display = 'block';
            document.getElementById('controls').style.pointerEvents = 'none'; // กันกดเบิ้ล

            // หน่วงเวลา 2.5 วินาทีเพื่อให้อ่าน Feedback ก่อนเปลี่ยนคำถัดไป
            setTimeout(() => {
                feedbackEl.style.display = 'none';
                document.getElementById('controls').style.pointerEvents = 'auto';
                currentIndex++;
                showWord();
            }, 2500);
        }
    </script>
</body>
</html>
