<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Kitchen Dash: Hand Tracking AR</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'Arial', sans-serif; 
            background-color: #000; 
            -webkit-user-select: none; user-select: none;
            position: fixed; touch-action: none;
        }

        /* กล้องวิดีโอพื้นหลัง */
        #webcam {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
            transform: scaleX(-1); /* กลับซ้ายขวาเหมือนกระจก */
        }
        
        #tutorial-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); color: white; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; text-align: center; padding: 20px; box-sizing: border-box;
        }
        #start-btn {
            background: #ff9800; color: white; border: none; padding: 15px 35px;
            font-size: 22px; border-radius: 15px; cursor: pointer; margin-top: 25px;
            font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: none;
        }
        #loading-text { font-size: 18px; color: #ffeb3b; margin-top: 20px; }

        #score-ui {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: none;
        }
        .score-box { background: rgba(0,0,0,0.75); color: #ffeb3b; padding: 8px 20px; border-radius: 20px; font-size: 18px; font-weight: bold; }
        
        #drag-container {
            position: fixed; left: 50%; top: 30%; transform: translate(-50%, -50%);
            z-index: 1000; display: none; touch-action: none;
        }
        .card-box { 
            background: #fff; padding: 15px; border-radius: 20px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); text-align: center;
            width: 150px; border: 4px solid #ffcb2c;
        }
        .word-image { width: 110px; height: 110px; object-fit: contain; pointer-events: none; }
        .word-text { color: #333; font-size: 26px; font-weight: bold; margin: 5px 0 0 0; pointer-events: none; }

        #basket-container {
            position: fixed; bottom: 30px; left: 0; width: 100%;
            display: flex; justify-content: space-around; z-index: 1000; display: none;
            pointer-events: none;
        }
        .basket {
            width: 44%; background: rgba(255, 255, 255, 0.95); border-radius: 20px;
            padding: 15px 10px; text-align: center; box-sizing: border-box;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }
        .basket-countable { border: 4px dashed #007bff; color: #0056b3; }
        .basket-uncountable { border: 4px dashed #dc3545; color: #bd2130; }
        .basket-img { width: 65px; height: 65px; object-fit: contain; }
        .basket-title { font-size: 16px; font-weight: bold; margin-top: 5px; line-height: 1.3; }

        #feedback {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; max-width: 320px; padding: 25px 20px; border-radius: 20px; font-size: 26px; font-weight: bold;
            color: white; display: none; z-index: 2000; text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.6);
        }

        /* 🔴 เคอร์เซอร์จำลองตำแหน่งมือ */
        #hand-cursor {
            position: fixed; width: 20px; height: 20px; background-color: rgba(255, 0, 0, 0.7);
            border: 3px solid white; border-radius: 50%; z-index: 9999;
            transform: translate(-50%, -50%); display: none; pointer-events: none;
            transition: background-color 0.2s, transform 0.1s;
        }
        .pinching { background-color: rgba(0, 255, 0, 0.8) !important; transform: translate(-50%, -50%) scale(1.5) !important; }

    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>

    <div id="hand-cursor"></div>

    <div id="tutorial-overlay">
        <h2 style="font-size: 28px; color: #ffeb3b; margin-bottom: 5px;">Kitchen Dash 🧺 (AI Hand Tracking)</h2>
        <h3 style="margin-top: 0; font-weight: normal; color: #ddd;">เกมจีบนิ้วลากคำศัพท์ลงตะกร้า</h3>
        <p style="font-size: 18px; margin: 15px 0; max-width: 320px; line-height: 1.6; color: #eee;">
            ชูมือขึ้นมาหน้ากล้อง ✋ <br>
            แล้วใช้ **นิ้วชี้และนิ้วโป้งจีบเข้าหากัน** 🤏<br>เพื่อหยิบการ์ดลากลงตะกร้า!
        </p>
        <div id="loading-text">⏳ กำลังโหลด AI ตรวจจับมือ กรุณารอสักครู่...</div>
        <button id="start-btn" onclick="startGame()">ลุยกันเลย!</button>
    </div>

    <div id="score-ui"><div class="score-box">คะแนน: <span id="score">0</span></div></div>

    <div id="drag-container">
        <div class="card-box" id="drag-card">
            <img id="current-image" class="word-image" src="">
            <div class="word-text" id="current-word">Loading...</div>
        </div>
    </div>

    <div id="basket-container">
        <div class="basket basket-countable">
            <img class="basket-img" src="https://cdn-icons-png.flaticon.com/512/3081/3081986.png">
            <div class="basket-title">Countable<br>(นับได้)</div>
        </div>
        <div class="basket basket-uncountable">
            <img class="basket-img" src="https://cdn-icons-png.flaticon.com/512/3081/3081986.png">
            <div class="basket-title">Uncountable<br>(นับไม่ได้)</div>
        </div>
    </div>

    <div id="feedback"></div>

    <script>
        const wordList = [
            { word: "Apple", isCountable: true, img: "https://cdn-icons-png.flaticon.com/512/415/415733.png", hint: "แอปเปิ้ลนับเป็นลูกได้จ้า" },
            { word: "Milk", isCountable: false, img: "https://cdn-icons-png.flaticon.com/512/2934/2934812.png", hint: "นมเป็นของเหลว นับไม่ได้จ้า" },
            // ... (สามารถใส่คำศัพท์เพิ่มได้ตามเดิม) ...
            { word: "Egg", isCountable: true, img: "https://cdn-icons-png.flaticon.com/512/2912/2912165.png", hint: "ไข่นับเป็นฟองได้จ้า" },
            { word: "Rice", isCountable: false, img: "https://cdn-icons-png.flaticon.com/512/4080/4080133.png", hint: "เมล็ดข้าวเล็กเกินไป นับไม่ได้นะ" }
        ];

        let currentIndex = 0; let score = 0;
        const container = document.getElementById('drag-container');
        const cursor = document.getElementById('hand-cursor');
        
        let isGrabbed = false;
        let gameStarted = false;

        function startGame() {
            document.getElementById('tutorial-overlay').style.display = 'none';
            document.getElementById('score-ui').style.display = 'block';
            container.style.display = 'block';
            document.getElementById('basket-container').style.display = 'flex';
            cursor.style.display = 'block';
            wordList.sort(() => Math.random() - 0.5);
            gameStarted = true;
            showWord();
        }

        function showWord() {
            if(currentIndex >= wordList.length) {
                document.getElementById('current-word').innerHTML = "🎉 จบเกม! 🎉";
                document.getElementById('current-image').style.display = 'none';
                return;
            }
            const currentItem = wordList[currentIndex];
            document.getElementById('current-word').innerText = currentItem.word;
            document.getElementById('current-image').src = currentItem.img;
            
            // รีเซ็ตการ์ดกลับไปตรงกลาง
            container.style.left = '50%';
            container.style.top = '30%';
            container.style.transform = 'translate(-50%, -50%)';
        }

        // --- ระบบ AI MediaPipe สำหรับ Hand Tracking ---
        const videoElement = document.getElementById('webcam');
        
        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});

        hands.setOptions({
            maxNumHands: 1, // จับมือเดียวพอเพื่อความลื่นไหล
            modelComplexity: 0, // โมเดลเบาสำหรับมือถือ
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults((results) => {
            if (!gameStarted) return;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const indexFinger = landmarks[8]; // ปลายนิ้วชี้
                const thumb = landmarks[4];       // ปลายนิ้วโป้ง

                // คำนวณพิกัดมือแปลงเป็นพิกัดหน้าจอ (กล้องกลับซ้ายขวา ต้องนำ 1 ไปลบ x)
                const screenX = (1 - indexFinger.x) * window.innerWidth;
                const screenY = indexFinger.y * window.innerHeight;

                // อัปเดตตำแหน่งจุดเคอร์เซอร์สีแดง
                cursor.style.left = screenX + 'px';
                cursor.style.top = screenY + 'px';

                // คำนวณระยะห่างระหว่างนิ้วชี้และนิ้วโป้ง (หาระยะ Pinch)
                const distance = Math.hypot(indexFinger.x - thumb.x, indexFinger.y - thumb.y);
                const isPinching = distance < 0.05; // ถ้าห่างกันน้อยกว่าค่านี้ ถือว่า "กำลังจีบนิ้ว"

                if (isPinching) {
                    cursor.classList.add('pinching'); // เปลี่ยนสีเคอร์เซอร์เป็นสีเขียว
                    
                    if (!isGrabbed) {
                        // เช็คว่าตำแหน่งนิ้วตอนเริ่มจีบ อยู่ในกรอบของการ์ดหรือไม่
                        const rect = container.getBoundingClientRect();
                        if (screenX >= rect.left && screenX <= rect.right &&
                            screenY >= rect.top && screenY <= rect.bottom) {
                            isGrabbed = true;
                        }
                    } else {
                        // ถ้าจับอยู่ ให้การ์ดขยับตามพิกัดนิ้ว
                        container.style.left = screenX + 'px';
                        container.style.top = screenY + 'px';
                    }
                } else {
                    cursor.classList.remove('pinching');
                    
                    // ปล่อยนิ้ว (Drop)
                    if (isGrabbed) {
                        isGrabbed = false;
                        checkDropZone(screenX, screenY);
                    }
                }
            }
        });

        // เปิดกล้องและเริ่มส่งภาพเข้า AI
        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        
        camera.start().then(() => {
            // เมื่อกล้องและโมเดลพร้อม ให้ซ่อนข้อความโหลด และแสดงปุ่มเริ่มเกม
            document.getElementById('loading-text').style.display = 'none';
            document.getElementById('start-btn
